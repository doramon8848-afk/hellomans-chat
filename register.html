<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - HelloMansChat</title>
  <style>
    body { background: #121212; color: #ccc; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #333; }
    input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; }
    .date-group { display: flex; gap: 5px; }
    button { width: 100%; padding: 12px; background: #e6a860; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; color: black; }
  </style>
</head>
<body>

<div class="card">
  <h2>Register</h2>
  <input type="text" id="reg-user" placeholder="Username">
  <input type="password" id="reg-pass" placeholder="Password">
  <input type="email" id="reg-email" placeholder="Email">
  
  <select id="reg-gender">
    <option>Male</option>
    <option>Female</option>
  </select>
  
  <label style="font-size: 0.8em;">Birth date</label>
  <div class="date-group">
    <select id="reg-day"><option>Day</option></select>
    <select id="reg-month"><option>Month</option></select>
    <select id="reg-year"><option>Year</option></select>
  </div>
  
  <button onclick="register()">Register</button>
  <p><a href="index.html" style="color:#e6a860; font-size: 0.8em;">Back to Home</a></p>
</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

    const app = initializeApp({
      apiKey: "YOUR_FIREBASE_API_KEY",
      authDomain: "hellomanschat-7b8e3.firebaseapp.com",
      projectId: "hellomanschat-7b8e3",
      storageBucket: "hellomanschat-7b8e3.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    });

    const auth = getAuth(app);

    window.register = async () => {
      let email = document.getElementById('reg-email').value;
      let pass = document.getElementById('reg-pass').value;

      createUserWithEmailAndPassword(auth, email, pass)
        .then(() => {
          alert("Registered successfully!");
          window.location.href = 'login.html';
        })
        .catch((error) => alert(error.message));
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0c12;
    --panel:#11141e;
    --panel-2:#161a26;
    --line:#232838;
    --text:#e7e9f0;
    --muted:#7a8095;
    --cyan:#33f7d6;
    --magenta:#ff3fd8;
    --magenta-dim:#7a2362;
    --danger:#ff5c5c;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  .display{font-family:'Space Grotesk',sans-serif;}

  /* ---------- background atmosphere ---------- */
  .glow-bg{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(700px 500px at 10% -5%, rgba(51,247,214,.08), transparent 60%),
      radial-gradient(800px 600px at 100% 110%, rgba(255,63,216,.08), transparent 60%);
  }

  /* ---------- app shell ---------- */
  #app{position:relative; z-index:1; display:flex; height:100vh; width:100vw;}

  /* ===== LOGIN SCREEN ===== */
  #login{
    position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(1200px 800px at 50% 20%, rgba(51,247,214,.06), transparent 60%), var(--bg);
  }
  .login-card{
    width:min(380px,90vw); padding:36px 32px; background:var(--panel);
    border:1px solid var(--line); border-radius:20px;
    box-shadow:0 0 0 1px rgba(51,247,214,.05), 0 30px 80px -20px rgba(0,0,0,.7);
    text-align:center;
  }
  .logo-mark{
    width:52px;height:52px;margin:0 auto 18px;border-radius:14px;
    background:linear-gradient(135deg,var(--cyan),var(--magenta));
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk';font-weight:700;font-size:22px;color:#06070a;
    box-shadow:0 0 30px -4px rgba(51,247,214,.6);
  }
  .login-card h1{font-size:22px;margin:0 0 6px;letter-spacing:.2px;}
  .login-card p{color:var(--muted);font-size:13.5px;margin:0 0 24px;line-height:1.5;}
  .field{margin-bottom:14px;text-align:left;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.3px;}
  .field input{
    width:100%;padding:12px 14px;background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;color:var(--text);font-size:14.5px;font-family:inherit;outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .field input:focus{border-color:var(--cyan); box-shadow:0 0 0 3px rgba(51,247,214,.12);}
  .btn-primary{
    width:100%;padding:13px;margin-top:6px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(135deg,var(--cyan),#21c8ff);color:#04141a;
    font-family:'Space Grotesk';font-weight:600;font-size:14.5px;letter-spacing:.2px;
    transition:transform .12s, box-shadow .12s;
  }
  .btn-primary:hover{transform:translateY(-1px); box-shadow:0 8px 24px -6px rgba(51,247,214,.45);}
  .btn-primary:active{transform:translateY(0);}
  .login-hint{margin-top:16px;font-size:11.5px;color:var(--muted);}

  /* ===== SIDEBAR: ROOMS ===== */
  #rooms-panel{
    width:240px; min-width:240px; background:var(--panel); border-right:1px solid var(--line);
    display:flex; flex-direction:column;
  }
  .brand{
    display:flex; align-items:center; gap:10px; padding:18px 18px 16px; border-bottom:1px solid var(--line);
  }
  .brand .logo-mark{width:32px;height:32px;font-size:14px;margin:0;}
  .brand-name{font-family:'Space Grotesk';font-weight:700;font-size:16px;}
  .brand-name span{color:var(--cyan);}

  .section-label{
    font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted);
    padding:18px 18px 8px;
  }
  #room-list{flex:1; overflow-y:auto; padding:0 10px;}
  .room-item{
    display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:10px;
    cursor:pointer; color:var(--muted); margin-bottom:2px; transition:background .12s, color .12s;
    position:relative;
  }
  .room-item:hover{background:var(--panel-2); color:var(--text);}
  .room-item.active{background:rgba(51,247,214,.08); color:var(--text);}
  .room-item.active::before{
    content:''; position:absolute; left:-10px; top:8px; bottom:8px; width:3px; border-radius:3px;
    background:linear-gradient(180deg,var(--cyan),var(--magenta));
  }
  .room-dot{width:7px;height:7px;border-radius:50%;background:var(--muted); flex-shrink:0;}
  .room-item.active .room-dot{background:var(--cyan); box-shadow:0 0 8px var(--cyan);}
  .room-name{font-size:14px; font-weight:500; flex:1;}
  .room-count{font-size:11px; color:var(--muted);}

  .me-box{
    display:flex; align-items:center; gap:10px; padding:14px 16px; border-top:1px solid var(--line);
  }
  .avatar{
    width:34px;height:34px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;
    font-family:'Space Grotesk'; color:#06070a;
  }
  .me-name{font-size:13.5px; font-weight:600;}
  .me-status{font-size:11px; color:var(--cyan);}

  /* ===== CENTER: MESSAGES ===== */
  #chat-panel{flex:1; display:flex; flex-direction:column; min-width:0;}
  #chat-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; border-bottom:1px solid var(--line); background:var(--panel);
  }
  #chat-header h2{margin:0; font-size:16px; font-family:'Space Grotesk'; font-weight:600; display:flex; align-items:center; gap:8px;}
  #chat-header .sub{font-size:12px; color:var(--muted); margin-top:2px;}
  .pulse-dot{
    width:8px;height:8px;border-radius:50%; background:var(--cyan); box-shadow:0 0 10px var(--cyan);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  #toggle-users{
    display:none; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:8px 10px; border-radius:8px; cursor:pointer; font-size:12px;
  }

  #messages{flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:14px;}
  #messages::-webkit-scrollbar{width:8px;}
  #messages::-webkit-scrollbar-thumb{background:var(--panel-2); border-radius:8px;}

  .msg{display:flex; gap:12px; max-width:680px;}
  .msg .avatar{width:30px;height:30px;font-size:11px;}
  .msg-body{flex:1;}
  .msg-meta{display:flex; align-items:baseline; gap:8px; margin-bottom:3px;}
  .msg-name{font-size:13px; font-weight:600;}
  .msg-time{font-size:10.5px; color:var(--muted);}
  .msg-text{font-size:14px; line-height:1.5; color:#dadce6; word-break:break-word;}
  .msg.me{flex-direction:row-reverse; align-self:flex-end;}
  .msg.me .msg-meta{flex-direction:row-reverse;}
  .msg.me .msg-body{text-align:right;}

  .system-msg{
    text-align:center; font-size:11.5px; color:var(--muted); padding:4px 0;
  }

  .empty-state{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--muted); text-align:center; gap:8px;
  }
  .empty-state .glyph{font-size:34px; opacity:.5;}
  .empty-state b{color:var(--text); font-family:'Space Grotesk';}

  #composer{
    display:flex; align-items:center; gap:10px; padding:16px 24px; border-top:1px solid var(--line);
    background:var(--panel);
  }
  #composer input{
    flex:1; padding:13px 16px; background:var(--panel-2); border:1px solid var(--line);
    border-radius:24px; color:var(--text); font-size:14px; font-family:inherit; outline:none;
    transition:border-color .15s;
  }
  #composer input:focus{border-color:var(--cyan);}
  #send-btn{
    width:42px;height:42px;border-radius:50%;border:none;cursor:pointer; flex-shrink:0;
    background:linear-gradient(135deg,var(--cyan),var(--magenta)); display:flex; align-items:center; justify-content:center;
    transition:transform .12s;
  }
  #send-btn:hover{transform:scale(1.06);}
  #send-btn svg{width:18px;height:18px;}

  /* ===== RIGHT: ONLINE USERS ===== */
  #users-panel{
    width:220px; min-width:220px; background:var(--panel); border-left:1px solid var(--line);
    display:flex; flex-direction:column;
  }
  #users-list{flex:1; overflow-y:auto; padding:0 10px;}
  .user-row{display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px;}
  .user-row:hover{background:var(--panel-2);}
  .user-row .avatar{width:28px;height:28px;font-size:11px; position:relative;}
  .online-ring{
    position:absolute; bottom:-2px; right:-2px; width:9px;height:9px;border-radius:50%;
    background:var(--cyan); border:2px solid var(--panel);
  }
  .user-row .uname{font-size:13px;}
  .user-row .you-tag{font-size:10px; color:var(--cyan); margin-left:4px;}

  /* ===== responsive ===== */
  @media (max-width:900px){
    #users-panel{
      position:fixed; top:0; right:0; bottom:0; transform:translateX(100%); transition:transform .2s;
      z-index:5; box-shadow:-20px 0 40px rgba(0,0,0,.4);
    }
    #users-panel.open{transform:translateX(0);}
    #toggle-users{display:inline-block;}
  }
  @media (max-width:680px){
    #rooms-panel{
      position:fixed; top:0; left:0; bottom:0; width:220px; transform:translateX(-100%); transition:transform .2s; z-index:6;
    }
    #rooms-panel.open{transform:translateX(0);}
    #toggle-rooms{display:inline-block !important;}
    .msg{max-width:88%;}
  }
  #toggle-rooms{
    display:none; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:8px 10px; border-radius:8px; cursor:pointer; font-size:12px; margin-right:8px;
  }

  @media (prefers-reduced-motion: reduce){
    .pulse-dot{animation:none;}
    *{transition:none !important;}
  }
</style>
</head>
<body>

<div class="glow-bg"></div>

<!-- APP -->
<div id="app" style="display:flex;">

  <!-- Rooms sidebar -->
  <div id="rooms-panel">
    <div class="brand">
      <div class="logo-mark">P</div>
      <div class="brand-name">Pulse<span>.</span></div>
    </div>
    <div class="section-label">Rooms</div>
    <div id="room-list"></div>
    <div class="me-box">
      <div class="avatar" id="me-avatar"></div>
      <div>
        <div class="me-name" id="me-name-label"></div>
        <div class="me-status">● online</div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-panel">
    <div id="chat-header">
      <div style="display:flex; align-items:center;">
        <button id="toggle-rooms">☰</button>
        <div>
          <h2><span class="pulse-dot"></span><span id="room-title" class="display"></span></h2>
          <div class="sub" id="room-sub"></div>
        </div>
      </div>
      <button id="toggle-users">People</button>
    </div>

    <div id="messages"></div>

    <div id="composer">
      <input id="msg-input" type="text" placeholder="Say something…" maxlength="500" autocomplete="off">
      <button id="send-btn" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 11.5L21 3L13.5 21L11 13L3 11.5Z" stroke="#06070a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <!-- Online users -->
  <div id="users-panel">
    <div class="section-label">Online</div>
    <div id="users-list"></div>
  </div>
</div>

<script>
(function(){
  const ROOMS = [
    {id:'general', name:'General', sub:'Open talk, all topics welcome'},
    {id:'music', name:'Music', sub:'Share what you\'re listening to'},
    {id:'gaming', name:'Gaming', sub:'Squads, scores, and chat'},
    {id:'random', name:'Random', sub:'Whatever, whenever'},
  ];
  const PALETTE = ['#33f7d6','#ff3fd8','#7c9bff','#ffd166','#ff6b6b','#9b8cff','#5be3a4'];

  let me = null;
  let meColor = null;
  let currentRoom = ROOMS[0].id;
  let pollTimer = null;
  let lastRenderedCount = -1;

  const $ = (sel)=>document.querySelector(sel);

  function colorFor(name){
    let h=0; for(let i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) >>> 0;
    return PALETTE[h % PALETTE.length];
  }
  function initials(name){ return name.slice(0,2).toUpperCase(); }
  function escapeHtml(str){
    const d=document.createElement('div'); d.innerText=str; return d.innerHTML;
  }
  function timeNow(){
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  // ---------- AUTO IDENTITY (no login screen) ----------
  function randomGuestName(){
    const adjectives = ['Neon','Echo','Vivid','Quiet','Lunar','Static','Pixel','Drift','Solar','Hollow'];
    const nouns = ['Fox','Wolf','Comet','Raven','Wave','Spark','Atlas','Ghost','Nova','Ember'];
    const a = adjectives[Math.floor(Math.random()*adjectives.length)];
    const n = nouns[Math.floor(Math.random()*nouns.length)];
    return `${a}${n}${Math.floor(Math.random()*90+10)}`;
  }

  me = localStorage.getItem('pulse_name');
  if(!me){
    me = randomGuestName();
    localStorage.setItem('pulse_name', me);
  }
  meColor = colorFor(me);
  initApp();

  // ---------- APP INIT ----------
  function initApp(){
    $('#me-name-label').textContent = me;
    const meAv = $('#me-avatar');
    meAv.textContent = initials(me);
    meAv.style.background = meColor;

    renderRoomList();
    selectRoom(currentRoom);
    registerPresence();

    $('#send-btn').addEventListener('click', sendMessage);
    $('#msg-input').addEventListener('keydown', e=>{ if(e.key==='Enter') sendMessage(); });

    $('#toggle-users').addEventListener('click', ()=> $('#users-panel').classList.toggle('open'));
    $('#toggle-rooms').addEventListener('click', ()=> $('#rooms-panel').classList.toggle('open'));

    setInterval(registerPresence, 8000);
    setInterval(refreshUsers, 4000);
    refreshUsers();
  }

  function renderRoomList(){
    const list = $('#room-list');
    list.innerHTML = '';
    ROOMS.forEach(r=>{
      const el = document.createElement('div');
      el.className = 'room-item' + (r.id===currentRoom?' active':'');
      el.innerHTML = `<span class="room-dot"></span><span class="room-name">${r.name}</span>`;
      el.addEventListener('click', ()=> selectRoom(r.id));
      list.appendChild(el);
    });
  }

  function selectRoom(roomId){
    currentRoom = roomId;
    const room = ROOMS.find(r=>r.id===roomId);
    $('#room-title').textContent = room.name;
    $('#room-sub').textContent = room.sub;
    renderRoomList();
    $('#rooms-panel').classList.remove('open');
    loadMessages(true);
    if(pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(()=>loadMessages(false), 2500);
  }

  // ---------- STORAGE LAYER ----------
  // window.storage only exists inside Claude's artifact preview. For a real
  // site (Netlify, etc.) we fall back to localStorage so the chat actually works.
  const hasArtifactStorage = !!(window.storage && typeof window.storage.get === 'function');

  async function storageGet(key){
    if(hasArtifactStorage){
      try{
        const res = await window.storage.get(key, true);
        return res ? res.value : null;
      }catch(e){ return null; }
    }
    return localStorage.getItem(key);
  }
  async function storageSet(key, value){
    if(hasArtifactStorage){
      try{ await window.storage.set(key, value, true); return; }catch(e){ /* fall through */ }
    }
    localStorage.setItem(key, value);
    // notify other tabs on this device immediately
    window.dispatchEvent(new CustomEvent('local-storage-update', {detail:{key}}));
  }
  async function storageListKeys(prefix){
    if(hasArtifactStorage){
      try{
        const res = await window.storage.list(prefix, true);
        return (res && res.keys) || [];
      }catch(e){ return []; }
    }
    const keys = [];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.startsWith(prefix)) keys.push(k);
    }
    return keys;
  }

  // react instantly to changes made in other tabs (same device) when using localStorage
  window.addEventListener('storage', (e)=>{
    if(!e.key) return;
    if(e.key.startsWith('room-msgs:'+currentRoom)){ loadMessages(true); }
    if(e.key.startsWith('presence:')){ refreshUsers(); }
  });
  window.addEventListener('local-storage-update', (e)=>{
    const key = e.detail && e.detail.key;
    if(!key) return;
    if(key.startsWith('room-msgs:'+currentRoom)){ loadMessages(true); }
    if(key.startsWith('presence:')){ refreshUsers(); }
  });

  async function getRoomMessages(roomId){
    const raw = await storageGet('room-msgs:'+roomId);
    if(!raw) return [];
    try{ return JSON.parse(raw); }catch(e){ return []; }
  }
  async function setRoomMessages(roomId, msgs){
    await storageSet('room-msgs:'+roomId, JSON.stringify(msgs));
  }

  async function sendMessage(){
    const input = $('#msg-input');
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    const msgs = await getRoomMessages(currentRoom);
    msgs.push({ name: me, color: meColor, text: text, ts: Date.now() });
    const trimmed = msgs.slice(-200);
    await setRoomMessages(currentRoom, trimmed);
    lastRenderedCount = -1;
    loadMessages(true);
  }

  async function loadMessages(force){
    const msgs = await getRoomMessages(currentRoom);
    if(!force && msgs.length === lastRenderedCount) return;
    lastRenderedCount = msgs.length;
    const box = $('#messages');

    if(msgs.length === 0){
      box.innerHTML = `<div class="empty-state"><div class="glyph">✦</div><div><b>It's quiet in here.</b><br>Be the first to say something.</div></div>`;
      return;
    }

    box.innerHTML = '';
    msgs.forEach(m=>{
      const mine = m.name === me;
      const row = document.createElement('div');
      row.className = 'msg' + (mine?' me':'');
      row.innerHTML = `
        <div class="avatar" style="background:${m.color || colorFor(m.name)}">${initials(m.name)}</div>
        <div class="msg-body">
          <div class="msg-meta">
            <span class="msg-name" style="color:${m.color || colorFor(m.name)}">${escapeHtml(m.name)}</span>
            <span class="msg-time">${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
          </div>
          <div class="msg-text">${escapeHtml(m.text)}</div>
        </div>`;
      box.appendChild(row);
    });
    box.scrollTop = box.scrollHeight;
  }

  // ---------- PRESENCE ----------
  async function registerPresence(){
    const key = 'presence:'+me;
    await storageSet(key, JSON.stringify({name:me, color:meColor, ts:Date.now()}));
  }

  async function refreshUsers(){
    const keys = await storageListKeys('presence:');
    if(!keys.length){ renderUsers([{name:me,color:meColor}]); return; }
    const now = Date.now();
    const users = [];
    for(const k of keys){
      const raw = await storageGet(k);
      if(raw){
        try{
          const data = JSON.parse(raw);
          if(now - data.ts < 25000){ users.push(data); }
        }catch(e){}
      }
    }
    if(!users.find(u=>u.name===me)) users.push({name:me,color:meColor});
    renderUsers(users);
  }

  function renderUsers(users){
    const box = $('#users-list');
    box.innerHTML = '';
    users.forEach(u=>{
      const row = document.createElement('div');
      row.className = 'user-row';
      row.innerHTML = `
        <div class="avatar" style="background:${u.color || colorFor(u.name)}">${initials(u.name)}<span class="online-ring"></span></div>
        <span class="uname">${escapeHtml(u.name)}${u.name===me?'<span class="you-tag">you</span>':''}</span>`;
      box.appendChild(row);
    });
  }
})();
</script>
</body>
</html>

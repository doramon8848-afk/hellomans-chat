<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HelloMansChat</title>
  <style>
    body { font-family: sans-serif; padding: 15px; background-color: #f4f4f9; }
    h2 { color: #333; text-align: center; }
    #chat { height: 350px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; background: white; border-radius: 8px; }
    input { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background-color: #218838; }
    p { margin: 5px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
  </style>
</head>
<body>
  <h2>HelloMansChat</h2>
  <input type="text" id="username" placeholder="Enter your name...">
  <div id="chat"></div>
  <input type="text" id="msg" placeholder="Type a message...">
  <button onclick="send()">Send</button>

  <script type="module">
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://hellomanschat-7b8e3-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const chatRef = ref(db, 'messages');

  window.send = function() {
    let name = document.getElementById('username').value;
    let msg = document.getElementById('msg').value;
    if(msg.trim() !== "") {
        push(chatRef, { name: name || "Anonymous", msg: msg });
        document.getElementById('msg').value = '';
    }
  };

  onValue(chatRef, (snapshot) => {
    let data = snapshot.val();
    let list = document.getElementById('chat');
    list.innerHTML = '';
    for(let key in data) {
      list.innerHTML += `<p><b>${data[key].name}:</b> ${data[key].msg}</p>`;
    }
  });
</script>
  
</body>
</html>

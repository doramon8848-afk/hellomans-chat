<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HelloMansChat - Welcome</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?ixlib=rb-1.2.1&auto=format&fit=crop&w=1351&q=80');
      background-size: cover;
      background-position: center;
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }
    h1 { margin-bottom: 10px; }
    .btn {
      display: block;
      width: 100%;
      max-width: 250px;
      padding: 15px;
      margin: 10px auto;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .login-btn { background: #5a9e2f; color: white; }
    .guest-btn { background: #4a453f; color: white; }
    .btn:hover { transform: scale(1.05); }
    a { color: #ff6600; text-decoration: none; }
  </style>
</head>
<body>
  <h1>HelloMansChat</h1>
  <p>Welcome to The Chat.<br>Make new friends and share fun moments!</p>
  
  <a href="login.html" class="btn login-btn">Login</a>
  
  <button class="btn guest-btn" onclick="guestLogin()">Guest login</button>

  <p>New here? <a href="register.html">Register now</a></p>

  <script>
    function guestLogin() {
      let user = prompt("Enter a nickname to join as a guest:");
      if (user && user.trim() !== "") {
        localStorage.setItem('username', user);
        window.location.href = 'chat.html';
      } else {
        alert("Please enter a valid nickname!");
      }
    }
  </script>
</body>
</html>

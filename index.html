<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HelloMansChat</title>
  <style>
    body { font-family: sans-serif; padding: 15px; background-color: #f4f4f9; }
    h2 { color: #333; text-align: center; }
    #chat { height: 350px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; background: white; border-radius: 8px; }
    input { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background-color: #218838; }
    p { margin: 5px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
  </style>
</head>
<body>
  <h2>HelloMansChat</h2>
  <input type="text" id="username" placeholder="Enter your name...">
  <div id="chat"></div>
  <input type="text" id="msg" placeholder="Type a message...">
  <button onclick="send()">Send</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDcDE-q6zNL3uwsmiT2j7c-VmUAz4lhOes",
      authDomain: "hellomanschat-7b8e3.firebaseapp.com",
      projectId: "hellomanschat-7b8e3",
      storageBucket: "hellomanschat-7b8e3.firebasestorage.app",
      messagingSenderId: "1047577647625",
      appId: "1:1047577647625:web:0e196d7c915212a1eeb6d8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function send() {
      const msgInput = document.getElementById("msg");
      const userInput = document.getElementById("username");
      
      if (msgInput.value.trim() !== "") {
        await addDoc(collection(db, "messages"), { 
          text: msgInput.value, 
          username: userInput.value || "Anonymous", 
          createdAt: serverTimestamp() 
        });
        msgInput.value = "";
      }
    }
    window.send = send;

    const q = query(collection(db, "messages"), orderBy("createdAt"));
    onSnapshot(q, (snapshot) => {
      let html = "";
      snapshot.forEach((doc) => { 
        const data = doc.data();
        html += `<p><b>${data.username}:</b> ${data.text}</p>`; 
      });
      const chatDiv = document.getElementById("chat");
      chatDiv.innerHTML = html;
      chatDiv.scrollTop = chatDiv.scrollHeight;
    });
  </script>
</body>
</html>
